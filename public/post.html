<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Item — WhereIsMy</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/items.html" class="nav-logo">WhereIsMy</a>
    <div class="nav-links">
      <a href="/items.html">Browse</a>
      <a href="/map.html">Map</a>
      <a href="/post.html">Post Item</a>
      <a href="/notifications.html" style="position:relative;display:inline-flex;align-items:center">
  Notifications
  <span class="notif-badge" id="notif-badge" style="position:relative;top:-8px;margin-left:4px">0</span>
</a>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1>Post an item</h1>
    <p class="subtitle">Report something you lost or found on campus</p>

    <div class="error" id="error"></div>
    <div class="success" id="success"></div>

    <div class="form-group">
      <label>I</label>
      <div class="type-toggle">
        <button class="type-btn active" id="btn-lost" onclick="setType('lost')">Lost something</button>
        <button class="type-btn" id="btn-found" onclick="setType('found')">Found something</button>
      </div>
    </div>

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="e.g. Black AirPods Pro" />
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category">
        <option value="">Select a category</option>
        <option value="electronics">Electronics</option>
        <option value="keys">Keys</option>
        <option value="bag">Bag / Backpack</option>
        <option value="wallet">Wallet / Purse</option>
        <option value="clothing">Clothing</option>
        <option value="id">ID / Card</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Describe the item in detail — color, brand, any identifying features"></textarea>
    </div>
<div class="form-group">
  <label for="location_name">Location name</label>
  <input type="text" id="location_name" placeholder="e.g. Library 2nd floor, near the printers" />
</div>

<div class="form-group">
  <label>Pin the location on the map <span style="color:#666;font-weight:400">(click to place)</span></label>
  <div id="location-map" style="height:250px;border-radius:10px;border:1px solid #ddd;margin-top:0.25rem"></div>
  <p style="font-size:12px;color:#666;margin-top:6px" id="coords-label">No location pinned yet</p>
</div>

    <div class="form-group">
      <label>Photo</label>
      <input type="file" id="photo" accept="image/*" />
      <div class="photo-preview" id="photo-preview"></div>
    </div>

    <button onclick="submitPost()" id="submit-btn">Post item</button>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="/js/auth-check.js"></script>
  <script src="/js/notifications.js"></script>
  <script src="/js/post.js"></script>
</body>
</html>
